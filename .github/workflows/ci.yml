# Sidebar name in GitHub Actions: clearer than a single "CI" label.
name: Tests and crawler runs

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "What to run"
        required: true
        default: "all"
        type: choice
        options:
          - tests
          - docker-e2e
          - all
      crawler_target:
        description: "Crawl target (manual runs only; default demo for stability)"
        required: true
        default: "demo"
        type: choice
        options:
          - demo
          - practicetestautomation

jobs:
  test:
    name: Test — pytest, Playwright, MongoDB
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'tests' || github.event.inputs.run_mode == 'all'
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://localhost:27017
      MONGO_DB_NAME: cytrix_crawler_ci
      MONGO_TEST_DB_NAME: cytrix_crawler_ci_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print run context
        run: |
          echo "CI event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch run_mode=${{ github.event.inputs.run_mode }}"
            echo "workflow_dispatch crawler_target=${{ github.event.inputs.crawler_target }}"
          else
            echo "Push or pull_request: tests only against local fixtures (no real-site crawl)."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Wait for MongoDB
        run: |
          python - <<'PY'
          import time
          from pymongo import MongoClient
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  client = MongoClient("mongodb://localhost:27017", serverSelectionTimeoutMS=1500)
                  client.admin.command("ping")
                  print("MongoDB is ready")
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("MongoDB did not become ready in time")
          PY

      - name: Test — run pytest
        run: python -m pytest -ra

  docker-e2e:
    name: Run — Docker Compose (demo stack)
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'docker-e2e' || github.event.inputs.run_mode == 'all') && github.event.inputs.crawler_target == 'demo'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Selected crawl target
        run: |
          echo "=========================================="
          echo "CI crawl target: demo (demo_app via Docker Compose)"
          echo "=========================================="

      - name: Validate compose file
        run: docker compose config

      - name: Run program — docker compose (crawler exit code)
        run: docker compose up --build --abort-on-container-exit --exit-code-from crawler

  crawl-practicetestautomation:
    name: Run — crawler on practicetestautomation.com
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.run_mode == 'docker-e2e' || github.event.inputs.run_mode == 'all') && github.event.inputs.crawler_target == 'practicetestautomation'
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://localhost:27017
      MONGO_DB_NAME: cytrix_crawler_ci_manual
      PLAYWRIGHT_HEADLESS: "1"
      CYTRIX_TARGET: practicetestautomation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Selected crawl target
        run: |
          echo "=========================================="
          echo "CI crawl target: practicetestautomation.com (real public practice site)"
          echo "=========================================="

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Wait for MongoDB
        run: |
          python - <<'PY'
          import time
          from pymongo import MongoClient
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  client = MongoClient("mongodb://localhost:27017", serverSelectionTimeoutMS=1500)
                  client.admin.command("ping")
                  print("MongoDB is ready")
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("MongoDB did not become ready in time")
          PY

      - name: Run program — python main.py (real site)
        run: python main.py
